<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваше спецпредложение</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="container">
        <div class="balloon red"></div>
        <div class="balloon blue"></div>
        <p class="hb">Нам 4 года!</p>
        <h1>Подарочный сертификат</h1>
        <h2>На приобретение кофейни</h2>

        <div class="old-price" id="oldPrice">0 тг</div>
        <div class="new-price" id="newPrice">0 тг</div>

        <div class="timer-text">Срок скидки закончится через:</div>
        <div id="timer">--:--:--</div>

        <!-- Замените номер на свой для WhatsApp -->
        <a href="https://wa.me/77478170308" class="btn">Использовать сертификат</a>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        const sheetUrl =
            'https://docs.google.com/spreadsheets/d/e/2PACX-1vSHTsgym-jNFshHjjPU5rCFiIXM89nCQx1xGzp6agXUGkR_ld0yUhIMCDrRpjRK1xWkfVHYOXd5nDc9/pub?output=csv';

        if (userId) {
            fetch(sheetUrl)
                .then(res => {
                    if (!res.ok) throw new Error('Таблица не найдена');
                    return res.text();
                })
                .then(csvText => {
                    const lines = csvText.split(/\r?\n/);
                    let foundRow = null;

                    for (let i = 0; i < lines.length; i++) {
                        const columns = lines[i].split(',');
                        const currentId = columns[0].replace(/["']/g, "").trim();
                        if (currentId === userId.toString().trim()) {
                            foundRow = columns;
                            break;
                        }
                    }

                    if (foundRow) {
                        const oldP = foundRow[1].replace(/["']/g, "");
                        const newP = foundRow[2].replace(/["']/g, "");
                        const hrs = parseInt(foundRow[3]) || 48;

                        document.getElementById('oldPrice').innerText = oldP + ' тг';
                        document.getElementById('newPrice').innerText = newP + ' тг';

                        startTimer(userId, hrs);
                    } else {
                        document.getElementById('timer').innerText = "Купон не найден";
                    }
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('timer').innerText = "Ошибка загрузки";
                });
        } else {
            document.getElementById('timer').innerText = "Параметр id отсутствует";
        }

        function startTimer(id, hours) {
            const storageKey = 'deadline_' + id;
            let deadline = localStorage.getItem(storageKey);

            if (!deadline) {
                deadline = new Date().getTime() + (hours * 60 * 60 * 1000);
                localStorage.setItem(storageKey, deadline);
            } else {
                deadline = parseInt(deadline);
            }

            const timerElement = document.getElementById('timer');
            const timerText = document.querySelector('.timer-text');
            const actionBtn = document.querySelector('.btn');

            function update() {
                const now = new Date().getTime();
                const t = deadline - now;

                if (t > 0) {
                    const h = Math.floor(t / (1000 * 60 * 60));
                    const m = Math.floor((t % (1000 * 60 * 60)) / (1000 * 60));
                    const s = Math.floor((t % (1000 * 60)) / 1000);
                    timerElement.innerText = `${h}:${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
                } else {
                    // ЛОГИКА ПРИ ИСТЕЧЕНИИ СРОКА:
                    clearInterval(timerInterval);
                    timerText.innerText = "Срок действия скидки окончен :(";
                    timerElement.innerText = "Обратитесь к своему менеджеру";
                    timerElement.style.fontSize = "1.2rem"; // Немного уменьшим шрифт для фразы

                    // Обновляем кнопку
                    actionBtn.innerText = "Связаться с менеджером";
                    // Текст сообщения: "Мой срок действия сертификата истёк :("
                    const encodedMsg = encodeURIComponent("Мой срок действия сертификата истёк :(");
                    actionBtn.href = `https://wa.me{encodedMsg}`;
                }
            }

            const timerInterval = setInterval(update, 1000);
            update();
        }
    </script>





</body>

</html>
